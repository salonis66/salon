<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE | Private Office</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        luxe: {
                            obsidian: '#050505',
                            charcoal: '#0F0F0F',
                            gold: '#C5A059',
                            champagne: '#F7F1E3',
                            border: 'rgba(197, 160, 89, 0.15)'
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .premium-blur { backdrop-filter: blur(24px); background: rgba(5, 5, 5, 0.85); }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--luxe-border); backdrop-filter: blur(15px); }
        .status-confirmed { color: #C5A059; border-color: rgba(197, 160, 89, 0.3); }
        .status-cancelled { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .stat-shimmer { background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.03), transparent); background-size: 200% 100%; animation: shimmer 4s infinite linear; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-luxe-obsidian text-white selection:bg-luxe-gold selection:text-black font-sans transition-colors duration-700 min-h-screen pb-20 overflow-x-hidden">

    <nav class="fixed w-full z-50 premium-blur border-b border-luxe-border">
        <div class="max-w-[1800px] mx-auto px-8 py-5 flex justify-between items-center">
            <a href="dashboard.html" class="text-2xl font-serif font-bold tracking-[8px]">LUXE<span class="text-luxe-gold">.</span></a>
            <div id="nav-auth"></div>
        </div>
    </nav>

    <header class="pt-48 pb-24 border-b border-white/5 relative">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-10 pointer-events-none"></div>
        <div class="container mx-auto px-8 flex flex-col items-center text-center space-y-8 relative z-10">
            <div class="relative group">
                <div class="w-32 h-32 rounded-full border border-luxe-gold/20 p-1 group-hover:border-luxe-gold transition-all duration-1000">
                    <div class="w-full h-full rounded-full bg-luxe-gold/5 flex items-center justify-center overflow-hidden">
                        <i class="fas fa-user-circle text-7xl text-luxe-gold/30 group-hover:text-luxe-gold/60 transition-all"></i>
                    </div>
                </div>
            </div>
            <div class="space-y-3">
                <h1 id="userName" class="text-6xl md:text-8xl font-serif italic tracking-tighter leading-none text-white">Guest</h1>
                <p id="userPhone" class="text-luxe-gold text-[10px] font-bold tracking-[6px] uppercase opacity-50">Private Member</p>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-8 mt-12 space-y-32">

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-12 text-center space-y-4 stat-shimmer group hover:border-luxe-gold/40 transition-all duration-700">
                <span class="text-[9px] font-bold tracking-[5px] uppercase text-white/40">Rituals Requested</span>
                <h3 id="totalBookings" class="text-5xl font-serif">0</h3>
            </div>
            <div class="glass-panel p-12 text-center space-y-4 group hover:border-luxe-gold/40 transition-all duration-700">
                <span class="text-[9px] font-bold tracking-[5px] uppercase text-white/40">Atelier Investment</span>
                <h3 id="totalSpent" class="text-5xl font-serif text-luxe-gold">₹0</h3>
            </div>
            <div class="glass-panel p-12 text-center space-y-4 group hover:border-luxe-gold/40 transition-all duration-700">
                <span class="text-[9px] font-bold tracking-[5px] uppercase text-white/40">Account Equity</span>
                <h3 id="totalPaid" class="text-5xl font-serif">₹0</h3>
            </div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-24">
            
            <section class="space-y-12">
                <div class="flex items-baseline justify-between border-b border-white/5 pb-6">
                    <div class="flex items-center space-x-5">
                        <span class="text-luxe-gold font-serif italic text-3xl">Upcoming</span>
                        <span class="h-[1px] w-12 bg-luxe-gold/20"></span>
                    </div>
                    <span class="text-[9px] font-bold tracking-[3px] uppercase opacity-30">Active Reservations</span>
                </div>
                <div id="upcomingList" class="space-y-8">
                    </div>
            </section>

            <section class="space-y-12">
                <div class="flex items-baseline justify-between border-b border-white/5 pb-6">
                    <div class="flex items-center space-x-5">
                        <span class="text-white/40 font-serif italic text-3xl">Archive</span>
                        <span class="h-[1px] w-12 bg-white/10"></span>
                    </div>
                    <span class="text-[9px] font-bold tracking-[3px] uppercase opacity-20">Past Journeys</span>
                </div>
                <div id="historyList" class="space-y-8">
                    </div>
            </section>
        </div>

    </main>

    <script>
        const checkLogin = () => localStorage.getItem('isLoggedIn') === 'true';

        async function fetchProfile() {
            try {
                const res = await fetch('https://salon-2-o4c3.onrender.com/user/getUserProfile');
                const data = await res.json();
                
                document.getElementById('userName').innerText = data.user.name;
                document.getElementById('userPhone').innerText = "+91 " + data.user.phone;
                document.getElementById('totalBookings').innerText = data.summary.totalBookings;
                document.getElementById('totalSpent').innerText = "₹" + data.summary.totalSpent;
                document.getElementById('totalPaid').innerText = "₹" + data.summary.totalPaid;

                renderApps(data.upcomingAppointments, 'upcomingList', true);
                renderApps(data.bookingHistory, 'historyList', false);
                updateNavbar();
            } catch (err) { console.error("Identity retrieval failed", err); }
        }

        function renderApps(list, containerId, canCancel) {
            const container = document.getElementById(containerId);
            if (!list || list.length === 0) {
                container.innerHTML = `<div class="p-12 glass-panel text-center text-white/20 italic text-sm border-dashed">No rituals found in this ledger.</div>`;
                return;
            }

            container.innerHTML = list.map(app => {
                const date = new Date(app.appointment_date).toLocaleDateString('en-GB', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });

                return `
                    <div class="glass-panel p-10 group hover:bg-white/[0.02] transition-all duration-700">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                            <div class="space-y-6 flex-grow">
                                <div class="flex items-center space-x-4">
                                    <span class="text-luxe-gold font-serif italic text-2xl">${date}</span>
                                    <span class="h-4 w-[1px] bg-white/10"></span>
                                    <span class="text-[10px] tracking-[4px] uppercase opacity-40 font-bold">${app.time_slot}</span>
                                </div>
                                <h4 class="text-2xl font-serif tracking-wide text-white/90 group-hover:text-white transition-colors">
                                    ${app.services.map(s => s.name).join(' • ')}
                                </h4>
                                <div class="flex items-center gap-6 pt-2">
                                    <span class="text-[9px] font-bold tracking-[3px] uppercase opacity-30">Paid: ₹${app.paid_amount}</span>
                                    <span class="text-[9px] font-bold tracking-[3px] uppercase opacity-30">Atelier ID: #${app.id}</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-6 w-full md:w-auto">
                                <span class="status-${app.status.toLowerCase()} text-[10px] font-bold tracking-[4px] uppercase border px-4 py-2 bg-white/[0.01]">
                                    ${app.status}
                                </span>
                                ${canCancel && app.status !== 'cancelled' ? 
                                    `<button onclick="cancelApp(${app.id})" class="text-[9px] font-bold tracking-[3px] uppercase text-red-400/50 hover:text-red-400 border-b border-red-400/20 hover:border-red-400 transition-all pb-1">
                                        Terminate Reservation
                                    </button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function cancelApp(id) {
            if(confirm("Are you sure you wish to terminate this reservation?")) {
                await fetch(`https://salon-2-o4c3.onrender.com/appointment/delete/${id}`, { method: 'PUT' });
                fetchProfile();
            }
        }

        function updateNavbar() {
            const auth = document.getElementById('nav-auth');
            auth.innerHTML = `<button onclick="logout()" class="text-[10px] font-bold tracking-[4px] uppercase border border-red-500/20 px-8 py-3 text-red-500/60 hover:bg-red-500/10 transition-all duration-500">Sign Out</button>`;
        }

      async function logout() {
  try {
    const res = await fetch("https://salon-2-o4c3.onrender.com/user/logout", {
      method: "GET",
      credentials: "include"
    });

    if(res.ok){
      localStorage.clear();
      window.location.href = "dashboard.html";
    }

  } catch(err){
    console.log(err);
  }
}

        window.onload = fetchProfile;
    </script>
</body>
</html>
